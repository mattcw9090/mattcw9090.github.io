    <!-- Contact Section -->
    <section class="contact-section container fade-in-on-scroll">
        <h2>Get in Touch</h2>
        <p>If you have a project you’d like to discuss or simply want to say hi, feel free to reach out.</p>
        <form action="mailto:your-email@example.com" method="post" enctype="text/plain" class="contact-form">
            <input type="text" name="name" placeholder="Your Name" required />
            <input type="email" name="email" placeholder="Your Email" required />
            <textarea name="message" rows="5" placeholder="Tell me about your project" required></textarea>
            <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
    </section>
